<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SPOI VT — Module 06 · Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F0F4F8;color:#1A2535;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.topbar{background:#1A2535;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
.tb-l{display:flex;align-items:center;gap:12px}
.back-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;text-decoration:none}
.tb-title{font-size:14px;font-weight:700;color:#fff}
.tb-sub{font-size:10px;color:rgba(255,255,255,.6)}
.live{display:flex;align-items:center;gap:6px;background:rgba(13,158,92,.25);border:1px solid rgba(13,158,92,.4);border-radius:20px;padding:4px 12px;font-size:10px;font-weight:700;color:#4ade80}
.dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.content{padding:14px;max-width:900px;margin:0 auto}
.krow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.ki{background:#fff;border:1px solid #C8D5E3;border-radius:12px;padding:16px;position:relative;overflow:hidden;cursor:pointer}
.ki::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.ki.cg::before{background:#0D9E5C}.ki.cb::before{background:#1A6FE8}
.ki.cr::before{background:#D93025}.ki.ca::before{background:#C97A00}
.kv{font-size:26px;font-weight:700;margin-bottom:3px}
.kl{font-size:11px;color:#7A90A4}
.kd{font-size:10px;font-weight:700;margin-top:5px}
.up{color:#0D9E5C}.dn{color:#D93025}.neu{color:#7A90A4}
.card{background:#fff;border:1px solid #C8D5E3;border-radius:12px;margin-bottom:12px;overflow:hidden}
.card-hdr{padding:10px 14px;background:#EEF2F7;border-bottom:1px solid #C8D5E3;display:flex;justify-content:space-between;align-items:center}
.card-title{font-size:11px;font-weight:700;color:#4A5E74;text-transform:uppercase;letter-spacing:.05em}
.ct-upd{font-size:10px;color:#7A90A4}
.zone-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #EEF2F7;font-size:12px}
.zone-row:last-child{border-bottom:none}
.zr-name{flex:1;font-weight:600}
.bar-bg{width:100px;height:6px;background:#EEF2F7;border-radius:3px;overflow:hidden}
.bar-fill{height:6px;border-radius:3px}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px}
.bd{background:#E6F9F1;color:#0A7A47}.bw{background:#EBF2FF;color:#1558C0}
.br{background:#FEE8E6;color:#B02018}.bt{background:#F0F4F8;color:#7A90A4}
.fiche-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:1px solid #EEF2F7;font-size:12px}
.fiche-row:last-child{border-bottom:none}
.fid{font-family:monospace;font-size:11px;background:#EEF2F7;padding:2px 6px;border-radius:4px;font-weight:600;flex-shrink:0}
.finfo{flex:1}
.fname{font-weight:600;margin-bottom:1px}
.fmeta{font-size:10px;color:#7A90A4}
.fst{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;flex-shrink:0}
.stc{background:#E6F9F1;color:#0A7A47}.stnc{background:#FEE8E6;color:#B02018}.stip{background:#FFF4E0;color:#9E5F00}
</style>
<!-- Auth Guard -->
<script>
(function(){
  var sess=null;
  try{sess=JSON.parse(localStorage.getItem('spoi_session'));}catch(e){}
  if(!sess||!sess.expires_at||new Date(sess.expires_at)<new Date()){
    localStorage.removeItem('spoi_session');
    window.location.href='login.html';
    return;
  }
  window.SPOI_USER=sess;
})();
</script>
</head>
<body>
<div class="topbar">
  <div class="tb-l">
    <a class="back-btn" href="portail.html">← Portail</a>
    <div><div class="tb-title">Module 06 — Dashboard</div><div class="tb-sub">KPIs temps réel · Supabase</div></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <a href="rapport.html" style="background:rgba(201,122,0,.3);border:1px solid rgba(201,122,0,.5);color:#F59E0B;border-radius:8px;padding:5px 12px;font-size:11px;font-weight:700;text-decoration:none">&#128203; Rapport S#XX</a>
    <div class="live"><div class="dot"></div>Live</div>
  </div>
</div>
<div class="content">
  <div class="krow">
    <div class="ki cg"><div class="kv" id="k-conf" style="color:#0D9E5C">-</div><div class="kl">Taux conformité</div><div class="kd up" id="k-conf-d"></div></div>
    <div class="ki cb"><div class="kv" id="k-tot" style="color:#1A6FE8">-</div><div class="kl">Fiches VT réalisées</div><div class="kd neu" id="k-tot-d"></div></div>
    <div class="ki cr"><div class="kv" id="k-nc" style="color:#D93025">-</div><div class="kl">Non-conformités</div><div class="kd dn" id="k-nc-d"></div></div>
    <div class="ki ca"><div class="kv" id="k-ncr" style="color:#C97A00">-</div><div class="kl">NCR ouvertes</div><div class="kd dn" id="k-ncr-d"></div></div>
    <div class="ki cg"><div class="kv" id="k-c" style="color:#0D9E5C">-</div><div class="kl">Points conformes</div><div class="kd up"></div></div>
    <div class="ki cb"><div class="kv" id="k-verif" style="color:#1A6FE8">-</div><div class="kl">Vérificateurs actifs</div><div class="kd neu"></div></div>
  </div>
  <div class="card">
    <div class="card-hdr"><span class="card-title">Avancement par gare</span><span class="ct-upd" id="last-upd">-</span></div>
    <div id="gare-list"></div>
  </div>
  <div class="card">
    <div class="card-hdr"><span class="card-title">Dernières fiches VT</span><span class="ct-upd">Temps réel</span></div>
    <div id="fiche-list"></div>
  </div>
</div>
<script>
var SB_URL='https://kkixktqinfxlkaolslvv.supabase.co';
var SB_KEY='sb_publishable_S_R-46sE2k9tPsU2yR_xKw_3z4CKYD3';

function loadDashboard(){
  // Charger fiches VT
  Promise.all([
    fetch(SB_URL+'/rest/v1/fiches_vt?order=created_at.desc',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}).then(function(r){return r.json();}),
    fetch(SB_URL+'/rest/v1/ncr_reserves?statut=neq.Levée',{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}}).then(function(r){return r.json();})
  ]).then(function(results){
    var fiches=results[0]||[];
    var ncrs=results[1]||[];
    renderDashboard(fiches, ncrs);
  }).catch(function(e){
    console.error('Erreur chargement:', e);
  });
}

function renderDashboard(fiches, ncrs){
  var total=fiches.length;
  var conformes=fiches.filter(function(f){return f.statut==='Conforme';}).length;
  var nc=fiches.filter(function(f){return f.statut==='Non-Conforme';}).length;
  var totalC=fiches.reduce(function(s,f){return s+(f.nb_points_c||0);},0);
  var verifs=[...new Set(fiches.map(function(f){return f.verificateur;}).filter(Boolean))].length;
  var pctConf=total>0?Math.round(conformes/total*100):0;

  document.getElementById('k-conf').textContent=pctConf+'%';
  document.getElementById('k-conf-d').textContent=conformes+' conformes / '+total;
  document.getElementById('k-tot').textContent=total;
  document.getElementById('k-tot-d').textContent=nc+' NC · '+(total-conformes-nc)+' en cours';
  document.getElementById('k-nc').textContent=nc;
  document.getElementById('k-nc-d').textContent=Math.round(nc/(total||1)*100)+'% du total';
  document.getElementById('k-ncr').textContent=ncrs.length;
  document.getElementById('k-ncr-d').textContent=ncrs.filter(function(n){return n.criticite==='Critique';}).length+' critiques';
  document.getElementById('k-c').textContent=totalC;
  document.getElementById('k-verif').textContent=verifs;

  // Par gare
  var gares={};
  fiches.forEach(function(f){
    if(!f.gare)return;
    if(!gares[f.gare])gares[f.gare]={total:0,conf:0};
    gares[f.gare].total++;
    if(f.statut==='Conforme')gares[f.gare].conf++;
  });
  var gareHtml=Object.keys(gares).map(function(g){
    var d=gares[g];
    var pct=Math.round(d.conf/d.total*100);
    var color=pct>=80?'#0D9E5C':pct>=60?'#C97A00':'#D93025';
    var cls=pct>=80?'bd':pct>=60?'':'br';
    return '<div class="zone-row">'+
      '<span class="zr-name">'+g+'</span>'+
      '<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%;background:'+color+'"></div></div>'+
      '<span style="font-size:11px;font-weight:700;color:'+color+';min-width:36px;text-align:right">'+pct+'%</span>'+
      '<span class="badge '+(pct>=80?'bd':pct>=60?'bw':'br')+'">'+d.total+' VT</span>'+
    '</div>';
  }).join('');
  document.getElementById('gare-list').innerHTML=gareHtml||'<div style="padding:20px;text-align:center;color:#7A90A4">Aucune donnée</div>';

  // Dernières fiches
  var ficheHtml=fiches.slice(0,8).map(function(f){
    var sc=f.statut==='Conforme'?'stc':f.statut==='Non-Conforme'?'stnc':'stip';
    return '<div class="fiche-row">'+
      '<span class="fid">'+(f.titre||'VT-'+f.id)+'</span>'+
      '<div class="finfo">'+
        '<div class="fname">'+(f.equipement||'—')+' <span style="font-family:monospace;font-size:10px;color:#7A90A4">'+(f.id_terrain||'')+'</span></div>'+
        '<div class="fmeta">'+(f.verificateur||'—')+' · '+(f.gare||'—')+' · '+(f.date_fiche||'—')+'</div>'+
      '</div>'+
      '<span class="fst '+sc+'">'+(f.statut||'—')+'</span>'+
    '</div>';
  }).join('');
  document.getElementById('fiche-list').innerHTML=ficheHtml||'<div style="padding:20px;text-align:center;color:#7A90A4">Aucune fiche</div>';
  
  document.getElementById('last-upd').textContent='Mis à jour '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}

loadDashboard();
setInterval(loadDashboard, 15000); // Refresh toutes les 15 secondes
</script>
</body></html>
