<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SPOI VT — Module 03 · NCR</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F0F4F8;color:#1A2535;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.topbar{background:#D93025;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.tb-l{display:flex;align-items:center;gap:12px}
.back-btn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;text-decoration:none}
.tb-title{font-size:14px;font-weight:700;color:#fff}
.tb-sub{font-size:10px;color:rgba(255,255,255,.7)}
.sync-badge{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700}
.content{padding:14px;max-width:800px;margin:0 auto}
.krow{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.ki{background:#fff;border:1px solid #C8D5E3;border-radius:10px;padding:12px;text-align:center}
.kv{font-size:22px;font-weight:700}.kl{font-size:10px;color:#7A90A4;margin-top:2px}
.kr{color:#D93025}.ka{color:#C97A00}.kg{color:#0D9E5C}.kb{color:#1A6FE8}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{background:#fff;border:1.5px solid #C8D5E3;border-radius:20px;padding:5px 14px;font-size:11px;font-weight:700;cursor:pointer;color:#4A5E74}
.filter-btn.act{background:#D93025;border-color:#D93025;color:#fff}
.card{background:#fff;border:1px solid #C8D5E3;border-radius:12px;margin-bottom:10px;overflow:hidden}
.ncr-hdr{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-bottom:1px solid #EEF2F7}
.ncr-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ncr-id{font-size:11px;font-family:monospace;font-weight:700;background:#EEF2F7;padding:2px 8px;border-radius:4px}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.bc{background:#FEE8E6;color:#B02018}.bm{background:#FFF4E0;color:#9E5F00}
.bo{background:#FEE8E6;color:#B02018}.bt{background:#FFF4E0;color:#9E5F00}
.bv{background:#E6F9F1;color:#0A7A47}.btr{background:#EBF2FF;color:#1558C0}
.ncr-body{padding:12px 14px;display:none}
.ncr-body.open{display:block}
.ncr-desc{font-size:13px;font-weight:600;margin-bottom:6px}
.ncr-meta{font-size:11px;color:#7A90A4;margin-bottom:10px}
.delai-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.dl-label{font-size:10px;color:#7A90A4;font-weight:600;white-space:nowrap}
.dl-track{flex:1;height:6px;background:#EEF2F7;border-radius:3px;overflow:hidden}
.dl-fill{height:6px;border-radius:3px}
.dl-val{font-size:10px;font-weight:700;white-space:nowrap}
.workflow{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.wf-btn{flex:1;padding:8px;border-radius:8px;border:2px solid #C8D5E3;background:#F8FAFC;font-size:11px;font-weight:700;cursor:pointer;text-align:center;min-width:80px;transition:all .15s}
.wf-btn.wf-act{border-color:currentColor}
.wf-ouv{color:#D93025}.wf-ouv.wf-act{background:#FEE8E6;border-color:#D93025}
.wf-trait{color:#1A6FE8}.wf-trait.wf-act{background:#EBF2FF;border-color:#1A6FE8}
.wf-lev{color:#0D9E5C}.wf-lev.wf-act{background:#E6F9F1;border-color:#0D9E5C}
.form-section{background:#F8FAFC;border-radius:8px;padding:12px;margin-bottom:10px}
.form-lbl{font-size:11px;font-weight:700;color:#4A5E74;margin-bottom:6px;display:block}
.form-in{width:100%;border:1.5px solid #C8D5E3;border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;outline:none;background:#fff;margin-bottom:8px}
.form-in:focus{border-color:#1A6FE8}
.form-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-save{width:100%;background:#0D9E5C;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;margin-top:4px}
.btn-save:hover{background:#0A7A47}
.empty{text-align:center;padding:32px;color:#7A90A4;font-size:13px}
.loading{text-align:center;padding:20px;color:#1A6FE8;font-size:13px}
.action-hist{font-size:11px;color:#4A5E74;background:#EEF2F7;border-radius:6px;padding:8px 10px;margin-top:8px}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-l">
    <a class="back-btn" href="portail.html">← Portail</a>
    <div><div class="tb-title">Module 03 — NCR / Réserves</div><div class="tb-sub">Workflow traitement · Délai contractuel 5j</div></div>
  </div>
  <span class="sync-badge" id="sync-badge">⏳ Chargement...</span>
</div>
<div class="content">
  <div class="krow">
    <div class="ki"><div class="kv kr" id="k-ouv">-</div><div class="kl">Ouvertes</div></div>
    <div class="ki"><div class="kv kb" id="k-trait">-</div><div class="kl">En traitement</div></div>
    <div class="ki"><div class="kv kg" id="k-lev">-</div><div class="kl">Levées</div></div>
    <div class="ki"><div class="kv kr" id="k-dep">-</div><div class="kl">Hors délai</div></div>
  </div>
  <div class="filter-bar">
    <button class="filter-btn act" onclick="setFilter('all',this)">Toutes</button>
    <button class="filter-btn" onclick="setFilter('Ouverte',this)">Ouvertes</button>
    <button class="filter-btn" onclick="setFilter('En traitement',this)">En traitement</button>
    <button class="filter-btn" onclick="setFilter('Levée',this)">Levées</button>
    <button class="filter-btn" onclick="setFilter('Critique',this)">Critiques</button>
  </div>
  <div id="ncr-list"><div class="loading">⏳ Chargement depuis Supabase...</div></div>
</div>

<script>
var SB_URL='https://kkixktqinfxlkaolslvv.supabase.co';
var SB_KEY='sb_publishable_S_R-46sE2k9tPsU2yR_xKw_3z4CKYD3';
var allNCR=[];
var currentFilter='all';
var openCard=null;

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('act');});
  btn.classList.add('act');
  renderNCR();
}

function loadNCR(){
  fetch(SB_URL+'/rest/v1/ncr_reserves?order=created_at.desc',{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  })
  .then(function(r){return r.json();})
  .then(function(data){
    allNCR=data||[];
    document.getElementById('sync-badge').textContent='✓ '+allNCR.length+' NCR';
    document.getElementById('sync-badge').style.background='rgba(13,158,92,.3)';
    updateKPIs();
    renderNCR();
  })
  .catch(function(e){
    document.getElementById('sync-badge').textContent='⚠ Erreur';
    document.getElementById('ncr-list').innerHTML='<div class="empty">Impossible de charger les données.</div>';
  });
}

function updateKPIs(){
  var today=new Date();
  var ouv=allNCR.filter(function(n){return n.statut==='Ouverte';}).length;
  var trait=allNCR.filter(function(n){return n.statut==='En traitement';}).length;
  var lev=allNCR.filter(function(n){return n.statut==='Levée';}).length;
  var dep=allNCR.filter(function(n){
    if(n.statut==='Levée')return false;
    return(today-new Date(n.created_at))/(1000*60*60*24)>5;
  }).length;
  document.getElementById('k-ouv').textContent=ouv;
  document.getElementById('k-trait').textContent=trait;
  document.getElementById('k-lev').textContent=lev;
  document.getElementById('k-dep').textContent=dep;
}

function renderNCR(){
  var data=allNCR;
  if(currentFilter!=='all'){
    if(currentFilter==='Critique'){
      data=data.filter(function(n){return n.criticite==='Critique';});
    } else {
      data=data.filter(function(n){return n.statut===currentFilter;});
    }
  }
  if(!data.length){
    document.getElementById('ncr-list').innerHTML='<div class="empty">✅ Aucune NCR pour ce filtre</div>';
    return;
  }
  var today=new Date();
  var html=data.map(function(n){
    var critCls=n.criticite==='Critique'?'bc':'bm';
    var stCls=n.statut==='Levée'?'bv':n.statut==='En traitement'?'btr':'bo';
    var jours=Math.floor((today-new Date(n.created_at))/(1000*60*60*24));
    var delaiPct=Math.min(jours/5*100,100);
    var delaiColor=n.statut==='Levée'?'#0D9E5C':jours>5?'#D93025':jours>=4?'#C97A00':'#0D9E5C';
    var delaiTxt=n.statut==='Levée'?'Levée ✓':jours>5?(jours-5)+'j DÉPASSÉ ⚠':((5-jours)+'j restant');
    var isOpen=openCard===n.id;
    
    return '<div class="card" id="card-'+n.id+'">'+
      '<div class="ncr-hdr" onclick="toggleCard('+n.id+')">'+
        '<div class="ncr-top">'+
          '<span class="ncr-id">'+(n.titre||'NCR-'+n.id)+'</span>'+
          '<span class="badge '+critCls+'">'+(n.criticite||'Mineure')+'</span>'+
          '<span class="badge '+stCls+'">'+(n.statut||'Ouverte')+'</span>'+
          '<span style="font-size:11px;color:'+delaiColor+';font-weight:700">'+delaiTxt+'</span>'+
        '</div>'+
        '<span style="font-size:16px;color:#7A90A4">'+(isOpen?'▲':'▼')+'</span>'+
      '</div>'+
      '<div class="ncr-body'+(isOpen?' open':'')+'" id="body-'+n.id+'">'+
        '<div class="ncr-desc">'+(n.description||'Non-conformité détectée')+'</div>'+
        '<div class="ncr-meta">'+
          '<b>Équipement:</b> '+(n.equipement||'—')+' · '+
          '<b>ID:</b> '+(n.id_terrain||'—')+' · '+
          '<b>Gare:</b> '+(n.gare||'—')+' · '+
          '<b>Voie:</b> '+(n.voie||'—')+'<br>'+
          '<b>Ouvert par:</b> '+(n.ouvert_par||'—')+' le '+(n.date_ouverture||'—')+
          (n.leve_par?'<br><b>Levé par:</b> '+n.leve_par+' le '+(n.date_cloture||'—'):'')+
        '</div>'+
        '<div class="delai-bar">'+
          '<span class="dl-label">Délai 5j</span>'+
          '<div class="dl-track"><div class="dl-fill" style="width:'+delaiPct+'%;background:'+delaiColor+'"></div></div>'+
          '<span class="dl-val" style="color:'+delaiColor+'">'+jours+'j écoulé(s)</span>'+
        '</div>'+
        
        // WORKFLOW
        '<div class="form-section">'+
          '<span class="form-lbl">🔄 Changer le statut</span>'+
          '<div class="workflow">'+
            '<button class="wf-btn wf-ouv'+(n.statut==='Ouverte'?' wf-act':'')+'" onclick="changeStatut('+n.id+','Ouverte')">⚠ Ouverte</button>'+
            '<button class="wf-btn wf-trait'+(n.statut==='En traitement'?' wf-act':'')+'" onclick="changeStatut('+n.id+','En traitement')">🔧 En traitement</button>'+
            '<button class="wf-btn wf-lev'+(n.statut==='Levée'?' wf-act':'')+'" onclick="changeStatut('+n.id+','Levée')">✅ Levée</button>'+
          '</div>'+
        '</div>'+
        
        // FORMULAIRE TRAITEMENT
        '<div class="form-section">'+
          '<span class="form-lbl">📝 Traitement & clôture</span>'+
          '<div class="form-row2">'+
            '<div><label class="form-lbl">Responsable levée</label><input class="form-in" id="resp-'+n.id+'" placeholder="Nom agent" value="'+(n.leve_par||'')+'"></div>'+
            '<div><label class="form-lbl">Date clôture</label><input class="form-in" type="date" id="date-'+n.id+'" value="'+(n.date_cloture||'')+'"></div>'+
          '</div>'+
          '<label class="form-lbl">Action corrective</label>'+
          '<textarea class="form-in" id="action-'+n.id+'" rows="2" placeholder="Décrivez l'action corrective effectuée...">'+(n.action_corrective||'')+'</textarea>'+
          '<label class="form-lbl">Criticité</label>'+
          '<select class="form-in" id="crit-'+n.id+'">'+
            '<option value="Mineure"'+(n.criticite==='Mineure'?' selected':'')+'>Mineure</option>'+
            '<option value="Critique"'+(n.criticite==='Critique'?' selected':'')+'>Critique</option>'+
          '</select>'+
          '<button class="btn-save" onclick="saveNCR('+n.id+')">💾 Enregistrer le traitement</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
  document.getElementById('ncr-list').innerHTML=html;
}

function toggleCard(id){
  openCard=openCard===id?null:id;
  renderNCR();
}

function changeStatut(id, statut){
  fetch(SB_URL+'/rest/v1/ncr_reserves?id=eq.'+id,{
    method:'PATCH',
    headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY},
    body:JSON.stringify({statut:statut})
  }).then(function(){
    var ncr=allNCR.find(function(n){return n.id===id;});
    if(ncr)ncr.statut=statut;
    updateKPIs();
    renderNCR();
  });
}

function saveNCR(id){
  var resp=document.getElementById('resp-'+id).value;
  var date=document.getElementById('date-'+id).value;
  var action=document.getElementById('action-'+id).value;
  var crit=document.getElementById('crit-'+id).value;
  
  var data={
    leve_par:resp,
    date_cloture:date,
    action_corrective:action,
    criticite:crit
  };
  
  // Si responsable et date renseignés → statut Levée automatique
  if(resp&&date){data.statut='Levée';}
  
  fetch(SB_URL+'/rest/v1/ncr_reserves?id=eq.'+id,{
    method:'PATCH',
    headers:{'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY},
    body:JSON.stringify(data)
  }).then(function(r){
    if(r.ok){
      loadNCR();
      alert('✓ NCR mise à jour dans Supabase'+(resp&&date?' — Statut: Levée':''));
    }
  });
}

loadNCR();
setInterval(loadNCR,30000);
</script>
</body></html>
